name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ZEPHYR_SDK_VERSION: "0.17.0"
  ZEPHYR_WORKSPACE: ${{ github.workspace }}/zephyrproject
  ZEPHYR_SDK_DIR: ${{ github.workspace }}/zephyr-sdk-0.17.0
  BOARD: nrf52840_mdk

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: nrf_control

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # ---------- Zephyr SDK ----------
    - name: Cache Zephyr SDK
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: ${{ env.ZEPHYR_SDK_DIR }}
        key: zephyr-sdk-${{ env.ZEPHYR_SDK_VERSION }}-linux-x86_64

    - name: Install Zephyr SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz
        tar -xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz
        rm zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64.tar.xz
        cd ${ZEPHYR_SDK_DIR}
        ./setup.sh -t arm-zephyr-eabi -c

    # ---------- West + Zephyr workspace ----------
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq git cmake ninja-build gperf ccache \
          dfu-util device-tree-compiler wget xz-utils file make \
          gcc gcc-multilib g++-multilib libsdl2-dev libmagic1

    - name: Install west
      run: |
        pip install west

    - name: Cache West modules
      id: cache-west
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ZEPHYR_WORKSPACE }}/.west
          ${{ env.ZEPHYR_WORKSPACE }}/bootloader
          ${{ env.ZEPHYR_WORKSPACE }}/modules
          ${{ env.ZEPHYR_WORKSPACE }}/tools
          ${{ env.ZEPHYR_WORKSPACE }}/zephyr
        key: west-modules-${{ runner.os }}-${{ hashFiles('nrf_control/.github/workflows/build.yml') }}
        restore-keys: |
          west-modules-${{ runner.os }}-

    - name: Initialize Zephyr workspace
      run: |
        if [ ! -d "${ZEPHYR_WORKSPACE}/.west" ]; then
          mkdir -p ${ZEPHYR_WORKSPACE}
          cd ${ZEPHYR_WORKSPACE}
          west init
          west update
        else
          cd ${ZEPHYR_WORKSPACE}
          west update
        fi
        west zephyr-export

    - name: Install Zephyr Python requirements
      run: |
        pip install -r ${ZEPHYR_WORKSPACE}/zephyr/scripts/requirements.txt

    # ---------- Build ----------
    - name: Build Firmware
      run: |
        cd ${ZEPHYR_WORKSPACE}
        west build -b ${BOARD} \
          -d ${{ github.workspace }}/nrf_control/app/build \
          ${{ github.workspace }}/nrf_control/app

    # ---------- Artifacts ----------
    - name: Upload firmware hex
      uses: actions/upload-artifact@v4
      with:
        name: camera-remote-firmware
        path: nrf_control/app/build/zephyr/zephyr.hex
