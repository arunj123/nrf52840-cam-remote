# OpenOCD Configuration for nRF52840 Recovery via ST-Link (V2/V2.1)
# Optimized for OpenOCD 0.12+

adapter driver hla
hla layout stlink
hla device_desc "ST-LINK/V2"
hla vid_pid 0x0483 0x3748

# Use standard swd transport
transport select swd

# Source the nRF52 target configuration
source [find target/nordic/nrf52.cfg]

# Simplified procedure to flash the bootloader
proc flash_bootloader {hex_file} {
    init
    reset halt
    # Try to flash using the 'program' helper which handles erase/verify
    program $hex_file verify reset exit
}
