# Increased stack due to settings API usage
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_DEVICE_APPEARANCE=384
CONFIG_BT_DEVICE_NAME="Cam Remote Pro"

CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=1
CONFIG_BT_DIS_PNP_VID=0x05AC
CONFIG_BT_DIS_PNP_PID=0x0220
CONFIG_BT_DIS_PNP_VER=0x0110
CONFIG_BT_BAS=y

# Enable SMP for HID security (Just Works pairing)
CONFIG_BT_SMP=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# BT_SETTINGS requires a flash backend
CONFIG_SETTINGS_NVS=y

CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y

# Power Management — CPU auto-sleep when idle (GPIO interrupt wakes)
# NOTE: Do NOT enable CONFIG_PM_DEVICE_RUNTIME — it suspends PWM/GPIO
# peripherals, causing buzzer and LED to stop working after idle.
CONFIG_PM=y

# Modern C++20 Support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_EXTERNAL_LIBCPP=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Just Works pairing only provides BT_SECURITY_L2 (encryption without MITM).
# Disable authenticated permissions so HID attributes only require encryption.
CONFIG_SAMPLE_BT_USE_AUTHENTICATION=n
